name: medtrack
description: A medical reports tracking and management application

# Update the version as needed
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP client for API calls
  http: ^1.1.0
  
  # Date formatting utilities
  intl: ^0.18.1
  
  # State management (optional - add if needed)
  # provider: ^6.1.1
  
  # Secure storage for tokens
